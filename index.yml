      3-moving-mountains-of-data-off-s3:
        description: Migrating S3 object storage to self-hosted Pure Storage — tooling, process, and $1M+ annual savings
      4-rails-delegated-type-pattern:
        description: Rails delegated_type — polymorphic associations with concrete tables, STI comparison, and real-world usage

    37signals-rework:
      description: "REWORK podcast: Episodes on product development, shipping, hiring, communication, and culture"
      index:
        description: "REWORK podcast episode index — episodes with titles, dates, and thematic cross-references"
      product-development:
        description: Shape Up methodology, shipping discipline, product philosophy, decisions, and scope management
      work-culture:
        description: Sustainable pace, remote work, meetings, interruptions, and company culture practices
      hiring:
        description: When to hire, who to hire, evaluation process, team structure, and onboarding
      communication:
        description: Async-first principles, cycle communication, customer outreach, and apologies
      marketing:
        description: Teaching as marketing, founder-led content, audience building, and free plan strategy
      business-philosophy:
        description: Profitable independence, anti-VC stance, ONCE pay-once model, and open source commitment
      customer-support:
        description: Support as a feature, everyone on front lines, community building, and customer segmentation
      founder-leadership:
        description: Stepping back, sabbaticals, co-founder partnerships, and lean org design
      privacy-ethics:
        description: Email tracking, anti-surveillance stance, school monitoring, and Big Tech accountability
      cloud-exit:
        description: Cloud-to-owned-hardware migration rationale, process, tooling, and $7M savings outcome

    lexfridman:
      description: "Lex Fridman Podcast: long-form conversations with scientists, engineers, philosophers, and public figures on AI, science, history, and the human condition"
      adam-frank:
        description: "Astrophysicist Adam Frank explores the probability of alien civilizations, the emerging science of technosignatures, and the co-evolution of life and planets — arguing that the universe has run 10 billion trillion habitable-zone experiments, making it statistically implausible that technological civilization has happened only once."
      ai-sota-2026:
        description: "Nathan Lambert (post-training lead at AI2) and Sebastian Raschka (author of Build a Large Language Model from Scratch) survey the full state of AI in early 2026, covering the China vs. US race, open-weight models, scaling laws, post-training breakthroughs, AGI timelines, and the future of programming."
      andrew-callaghan:
        description: "Andrew Callaghan traces his path from a 9th-grade journalism class in Seattle — shaped by HPPD from early psilocybin use — through hitchhiking across the US, working Bourbon Street, creating Quarter Confessions, launching All Gas No Breaks and Channel 5, and filming the HBO documentary This Place Rules on the undercurrents behind January 6th. He discusses his encounters with Alex Jones and QAnon, his public controversy over sexual misconduct allegations, and his view that listening without preconceptions is the only way to close America's tribal divide."
      andrew-huberman-4:
        description: "Andrew Huberman and Lex Fridman explore the neuroscience and psychology of romantic relationships, betrayal, loyalty, covert contracts, sexual selection, fertility, and what it means to find inner peace — recorded spontaneously on Lex's birthday in Austin."
      andrew-huberman-5:
        description: "Andrew Huberman and Lex Fridman cover the neuroscience of deep focus, the mechanics of online scientific controversy, psychedelics and Jungian psychology, nicotine and caffeine as cognitive tools, and personal reflections on relationships, friendship, and productivity."
      annie-jacobsen:
        description: "Investigative journalist Annie Jacobsen walks through the exact mechanics of nuclear war from satellite detection to nuclear winter, drawing on interviews with former Secretaries of Defense, STRATCOM commanders, FEMA directors, and CIA operatives. The conversation also covers CIA assassination programs, the real explanation for the Roswell incident, the government's secret ESP research, and the disinformation campaigns behind UFO lore."
      aravind-srinivas:
        description: "Aravind Srinivas explains how Perplexity reimagines search as a knowledge-discovery engine powered by retrieval-augmented generation, and offers his vision for how AI will transform reasoning, inference compute, and the future of the internet."
      bassem-youssef:
        description: "Egyptian-American comedian and political satirist Bassem Youssef discusses the Gaza conflict, October 7th, and the asymmetry of power in the Israel-Palestine situation. The conversation spans his origins as a heart surgeon turned Jon Stewart-inspired satirist, his cancellation and exile from Egypt, and his rebuilding of a career in American stand-up comedy."
      ben-shapiro:
        description: "Ben Shapiro, conservative commentator and co-founder of The Daily Wire, joins Lex Fridman for a wide-ranging conversation spanning antisemitism, the nature of evil, free speech on social media, US foreign policy, abortion, climate change, and the role of faith and meaning in human life. The discussion is notable for its mutual good faith, with Shapiro steelmanning positions he opposes and acknowledging areas where his views have shifted over time."
      ben-shapiro-destiny-debate:
        description: "Ben Shapiro (conservative) and Destiny (liberal) debate across 2.5 hours with Lex Fridman moderating, covering the foundational philosophies of the American right and left and their application to the most contested political questions of 2024. The conversation is distinctive for finding genuine areas of cross-partisan agreement while exposing the precise fault lines where the two debaters cannot reconcile."
      benjamin-netanyahu:
        description: "Benjamin Netanyahu, serving his sixth term as Prime Minister of Israel, speaks with Lex Fridman during a period of major domestic protests over proposed judicial reform. The conversation covers antisemitism, AI, Israeli democracy, the Abraham Accords, the Palestinian conflict, and Iran's nuclear ambitions."
      bernie-sanders:
        description: "Bernie Sanders, senator from Vermont and two-time presidential candidate, discusses the systemic corruption of American politics through oligarchic money, makes the case for Medicare for All, reflects on his 2016 campaign against the Democratic establishment, and explains why grassroots movements rather than individual leaders drive lasting political change."
      bill-ackman:
        description: "Bill Ackman traces his career from early activist investing battles through a near-catastrophic personal and financial low point, then turns to his public fight over Harvard's leadership, his critique of DEI ideology on campuses, and his views on free speech, X, and American politics."
      cenk-uygur:
        description: "Cenk Uygur, host of The Young Turks and progressive political commentator, lays out his framework for understanding American politics through a populist vs. establishment axis that he argues matters more than left vs. right. He dissects the mechanics of how corporate money corrupts politicians, why both major parties serve donor interests over voters, and what it would actually take to fix the system."
      charan-ranganath:
        description: "Charan Ranganath, a neuroscientist and psychologist at UC Davis, explains how memory works as a forward-looking prediction system rather than a passive recording, covering the hippocampus, episodic vs. semantic memory, false memories, deja vu, and how forgetting is a feature not a flaw."
      craig-jones-2:
        description: "Australian submission grappling champion Craig Jones recounts two trips to the Ukrainian front lines, including a 0.7 km approach to active combat in Kherson and visits to Chernobyl, framed alongside his founding of CJI — a $3 million, free-to-stream jiu-jitsu tournament deliberately scheduled against ADCC to force a reckoning over athlete pay."
      cursor-team:
        description: "The four founding members of Cursor — Michael Truell, Sualeh Asif, Arvid Lunnemark, and Aman Sanger — discuss how they built an AI-native code editor by forking VS Code, the ML architecture behind Cursor Tab and Apply, and their vision of a human-in-the-driver-seat future for programming."
      dan-houser:
        description: "Dan Houser, co-founder of Rockstar Games and lead writer behind Grand Theft Auto and Red Dead Redemption, traces the creative philosophy, writing process, and world-building principles behind some of the best-selling games of all time, and shares his vision for new worlds at Absurd Ventures."
      dana-white:
        description: "Dana White, president of the UFC, recounts how a childhood obsession with boxing and a $2 million acquisition of a near-bankrupt promotion became the world's dominant MMA organization. He reflects on the fighters, business battles, and personal philosophy that shaped the UFC's rise — from Joe Rogan's first unpaid commentary shifts to hosting a fight at the Las Vegas Sphere."
      dario-amodei:
        description: "Dario Amodei, Amanda Askell, and Chris Olah from Anthropic discuss scaling laws, AI safety levels, the Machines of Loving Grace vision for AGI's positive impact, mechanistic interpretability, and how Claude's character and alignment are trained."
      dave-hone:
        description: "Dave Hone, paleontologist and zoologist at Queen Mary University of London, walks through the biology, hunting strategies, behavior, and extinction of T. rex and other dinosaurs, while dissecting what Jurassic Park got right and wrong and explaining what the fossil record actually can and cannot tell us."
      dave-plummer:
        description: "Dave Plummer, creator of Windows Task Manager and author of Secrets of the Autistic Millionaire, recounts his path from a 7-Eleven night shift to Microsoft's elite engineering ranks, details how he built Task Manager, Space Cadet Pinball, and ZIP folder support, and reflects on programming, autism, and the future of software."
      dave-smith:
        description: "Dave Smith, libertarian comedian and podcast host, makes an uncompromising anti-war case across the most contested geopolitical conflicts of the present moment. The conversation spans libertarian philosophy, October 7th, the Epstein blackmail apparatus, NATO expansion, and the collapse of institutional trust in America."
      david-kirtley:
        description: "David Kirtley, CEO of Helion Energy, explains how pulsed magneto-inertial fusion works, why the field-reversed configuration is uniquely suited to direct electricity extraction, and how Helion plans to deliver fusion power to a Microsoft data center by 2028."
      deepseek-dylan-patel-nathan-lambert:
        description: "Dylan Patel (SemiAnalysis) and Nathan Lambert (Allen Institute for AI) break down the DeepSeek moment — its technical innovations, cost advantages, geopolitical implications, and what it reveals about the global AI race from chips to clusters to AGI timelines."
      demis-hassabis-2:
        description: "Demis Hassabis, DeepMind co-founder and Nobel Prize winner, explores his conjecture that any naturally occurring pattern can be efficiently learned by a classical algorithm, and maps the road from AlphaFold to AGI by 2030 via scientific discovery, world models, and cautious optimism about existential risk."
      dhh-david-heinemeier-hansson:
        description: "DHH traces his journey from failed programming student to creator of Ruby on Rails, covering his philosophy of beautiful code, the case against cloud dependency and management overhead, his views on AI and vibe coding, and lessons on work, family, and racing."
      donald-trump:
        description: "Donald Trump sits down with Lex Fridman weeks before the 2024 election, covering foreign policy, immigration, the 2020 election, and existential questions about power, mortality, and religion. The conversation spans 18 chapters from negotiation philosophy to UFO disclosures and Trump's personal psychology around winning, losing, and legacy."
      douglas-murray-2:
        description: "Douglas Murray, author of On Democracies and Death Cults, delivers firsthand reporting from Ukrainian front lines and Gaza to argue that the West chronically misreads both the Russia-Ukraine war and the Israeli-Palestinian conflict. He makes the case that democracies uniquely fail to name and resist death-cult ideologies, while Lex Fridman pushes back with questions about peace negotiations, Palestinian lived experience, and the psychology of antisemitism."
      ed-barnhart:
        description: "Ed Barnhart, archaeologist and Maya expert, takes Lex Fridman through the full arc of civilizations in the Americas — from the first migrations across the Bering Strait to the collapse of Maya city-states and the Aztec empire. The conversation spans lost civilizations in the Amazon, the fanged deity unifying Andean religion across millennia, the mathematics of the Maya calendar, Inca governance, and the catastrophic erasure caused by post-contact epidemics."
      edward-gibson:
        description: "Edward Gibson, psycholinguistics professor at MIT, explains why all human languages minimize dependency lengths, how dependency grammar outperforms Chomsky's movement theory, and why LLMs master linguistic form while likely missing semantic meaning."
      elon-musk-4:
        description: "Elon Musk covers the Israel-Hamas and Ukraine wars through a strategic lens of de-escalation and conspicuous kindness, then digs into xAI's Grok, the physics-first approach to AI reliability, the Fermi paradox, energy constraints on compute, and the convergence of Tesla Autopilot and LLMs toward AGI."
      elon-musk-and-neuralink-team:
        description: "Elon Musk, DJ Seo, Matthew MacDougall, Bliss Chapman, and Noland Arbaugh — the Neuralink team plus its first human patient — discuss the hardware, surgery, signal decoding, and long-term vision of brain-computer interfaces, from restoring movement in paralyzed patients to eventual human-AI symbiosis."
      ezra-klein-and-derek-thompson:
        description: "Ezra Klein and Derek Thompson join Lex Fridman to discuss their book Abundance, a supply-side manifesto arguing that the American left has abandoned building in favor of blocking. The conversation covers the ideological divide between left and right, the Democratic Party's leadership crisis, the housing and clean-energy scarcity problem, DOGE and the logic of government demolition, and what genuine government reform would look like."
      george-hotz-3:
        description: "George Hotz covers his founding of tiny corp and the tinygrad neural network framework, his case for decentralized AI compute as a defense against power concentration, and sharp critiques of AI safety orthodoxy, closed-source LLMs, and legacy software complexity."
      graham-hancock:
        description: "Graham Hancock makes the case that a sophisticated seafaring civilization existed before the Younger Dryas cataclysm ~12,800 years ago and was largely destroyed by it, seeding the myths, astronomical knowledge, and architectural traditions of the known ancient civilizations. The conversation spans Göbekli Tepe, the Giza plateau, precession of the equinoxes, the Younger Dryas impact hypothesis, shamanism, and psychedelics as a driver of human cultural development."
      greg-lukianoff:
        description: "Greg Lukianoff, president of FIRE and First Amendment attorney, traces the rise of cancel culture from 2014 onward and dissects the rhetorical tactics both the left and right use to avoid genuine argument. The conversation moves from university speech rankings and deplatforming mechanics to DEI statements, hate speech law, the printing-press analogy for social media, and Lukianoff's personal struggle with suicidal depression."
      gregory-aldrete:
        description: "Historian Gregory Aldrete walks through the full arc of Roman history — from its origins as a collection of mud huts through the Republic, the Empire, and its eventual transformation — using military, legal, religious, and everyday details to explain why Rome succeeded and how it ultimately changed. The conversation spans armor reconstruction experiments, Cicero's rhetorical techniques, Augustus's propaganda genius, and what Rome's trajectory teaches about power, integration, and the persistence of the past."
      guillaume-verdon:
        description: "Guillaume Verdon, the physicist behind the pseudonymous @BasedBeffJezos account, explains the thermodynamic foundations of effective accelerationism, his work on quantum machine learning and physics-based computing at Extropic, and why decentralized AI development is the path to avoiding civilizational doom."
      iran-war-debate:
        description: "A structured debate between libertarian anti-interventionist Scott Horton and Iran hawk Mark Dubowitz on whether Iran's nuclear program constitutes a genuine weapons threat and whether the 2025 US–Israel military strikes on Iranian facilities were justified. The two reach a narrow consensus that diplomacy is preferable but sharply disagree on almost every factual premise, causal chain, and proposed red line."
      irving-finkel:
        description: "Irving Finkel, Assyriologist and 45-year British Museum curator, takes Lex Fridman through the origins of writing, the mechanics and decipherment of cuneiform, Mesopotamian religion and ghosts, the Ark Tablet and its relationship to Genesis, the Royal Game of Ur, and what ancient civilization reveals about enduring human nature."
      israel-palestine-debate:
        description: "Four figures with sharply opposed frameworks — a revisionist Israeli historian, a Palestinian affairs analyst, a Holocaust scholar turned critic of Israel, and a political commentator — debate 1948, October 7, and Gaza across four and a half hours. The exchange is distinguished by participants quoting each other's own published work back at them and by the absence of any agreed factual baseline."
      ivanka-trump:
        description: "Ivanka Trump traces her lifelong passion for building — from studying New York's Gothic and Art Deco skyline as a teenager to leading renovations of the Old Post Office in Washington D.C. — and reflects on the formative influence of her mother Ivana (a Czech Olympic skier turned real estate executive) and her father Donald Trump, her four years as a White House senior advisor, and her decision to step away from politics to raise her three children."
      jack-weatherford:
        description: "Anthropologist and historian Jack Weatherford traces the full arc of Genghis Khan's life — from a kidnapped mother and abandoned childhood to the founding of the largest contiguous empire in history. He explores how trauma, loyalty, military genius, and pragmatic governance reshaped the medieval world."
      james-holland:
        description: "Historian James Holland delivers a sweeping operational-level analysis of World War II, tracing how ideology, logistics, and industrial capacity determined the war's outcome across every theater. He argues that the German 'Nazi war machine' was a myth sustained by a mechanized spearhead propped up by a largely horse-drawn army, and that the Allies won by substituting steel and production for human lives."
      james-sexton:
        description: "James Sexton, a divorce attorney with over two decades of high-conflict litigation experience, dissects why marriages fail and what makes them endure. The conversation ranges from the mechanics of disconnection and infidelity to prenuptial law, custody battles, jiu-jitsu philosophy, and the irreducible absurdity of love."
      janna-levin:
        description: "Theoretical physicist Janna Levin explores black holes as regions of spacetime rather than dense objects, walking through the information paradox, gravitational waves, wormholes, extra dimensions, and the search for alien life. She also discusses Godel, Turing, and the human stories behind great scientific discoveries."
      jared-kushner:
        description: "Jared Kushner, former senior White House advisor to President Trump, reflects on the October 7, 2023 Hamas attack on Israel hours after it occurred and discusses the full arc of his diplomatic work in the Middle East. The conversation spans the Abraham Accords, the Iran sanctions strategy, US-China trade negotiations, the First Step Act, and the personal experiences — including his father's imprisonment and the Russia collusion accusations — that shaped his approach to government."
      javier-milei:
        description: "Javier Milei, Argentina's libertarian president and economist, describes the radical free-market reforms he executed in his first year in office — cutting ministries, eliminating deficits, and slashing inflation from a trajectory of 17,000% annually to under 3%. He frames these economic battles as part of a broader three-front war against socialism in economics, politics, and culture."
      jeff-bezos:
        description: "Jeff Bezos covers the vision and engineering behind Blue Origin's New Glenn rocket and lunar lander program, then traces Amazon's foundational principles — customer obsession, Day One thinking, high-velocity decision-making, and the six-page memo culture — alongside reflections on AI, long-term thinking, and the future of humanity in space."
      jeffrey-wasserstrom:
        description: "Jeffrey Wasserstrom, historian of modern China, traces the ideological contradictions shaping contemporary China — from Confucian hierarchy and Maoist chaos through Tiananmen, censorship, and the Hong Kong suppression. He analyzes Xi Jinping's personality cult, the Taiwan question, and the 2025 US-China trade war as expressions of a century-long nationalist project."
      jennifer-burns:
        description: "Jennifer Burns, a historian of ideas, traces the intellectual lives of Milton Friedman and Ayn Rand — their shared individualism, divergent methods, and lasting influence on American capitalism and conservatism. The conversation spans the Great Depression, monetarism, stagflation, Reagan, DOGE, cryptocurrency, objectivism, and the mechanics of how ideas spread through societies."
      jimmy-wales:
        description: "Jimmy Wales, founder of Wikipedia, discusses the origin and design of the world's largest encyclopedia, its editorial philosophy, funding model, community dynamics, and the challenges of maintaining neutrality and resisting government censorship."
      joel-david-hamkins:
        description: "Joel David Hamkins, the all-time top-ranked user on MathOverflow and a philosopher-mathematician at Notre Dame, walks through the foundations of modern mathematics — from Cantor's hierarchy of infinities through Gödel's incompleteness theorems to the set-theoretic multiverse. The conversation traces how each crisis in the foundations of mathematics opened a new and richer landscape of ideas."
      john-mearsheimer:
        description: "John Mearsheimer, professor at the University of Chicago and originator of offensive realism, delivers a sweeping geopolitical analysis spanning the Ukraine war, the Israel-Palestine conflict, and the US-China rivalry. The conversation is distinctive for its unflinching structural critique of Western foreign policy and Mearsheimer's willingness to assign primary responsibility for the Ukraine war to NATO expansion rather than to Putin."
      jordan-jonas:
        description: "Jordan Jonas, winner of Alone Season 6, recounts 77 days of solo Arctic survival using indigenous techniques learned from Siberian tribes. The conversation spans freight-train hoboing, fur trapping with Evenki natives, his family's survival of the Armenian genocide and Nazi occupation, and his wrestling match with faith, mortality, and the psychology of enduring suffering."
      jordan-peterson-2:
        description: "Jordan Peterson covers Nietzsche's philosophy and its misappropriation by the Nazis, why the death of God produces communism and fascism as replacement religions, what the Abraham story reveals about individual calling, and how psychopathy, envy, and gratitude shape personal and civilizational fate."
      joscha-bach-3:
        description: "Joscha Bach explores the staged development of human consciousness from infancy to enlightenment, the nature of identity as constructed costume, and what LLMs reveal and obscure about the path to artificial general intelligence and machine consciousness."
      julia-shaw:
        description: "Julia Shaw, criminal psychologist and author, argues that evil is not a binary label but a continuum of dark personality traits present in every human, and that false memories are a feature of normal brain function with profound consequences for criminal justice, therapy, and AI."
      kevin-spacey:
        description: "Kevin Spacey, two-time Oscar-winning actor, discusses his craft across landmark roles in Se7en, American Beauty, and House of Cards, alongside a detailed account of the sexual misconduct allegations that cancelled him from Hollywood in 2017. The conversation moves through acting philosophy, mentorship under Jack Lemmon, collaborations with David Fincher and Sam Mendes, and his troubled relationship with a white-supremacist father."
      keyu-jin:
        description: "Keyu Jin, an LSE economist and author of The New China Playbook, dismantles Western misconceptions about China's hybrid economy, explaining the decentralized mayor-competition system that drove growth, the real mechanics of US-China trade tensions, and why China is neither purely communist nor fully capitalist. She draws on her own biography — growing up in Beijing, studying at Harvard, and living between East and West — to ground structural economic analysis in lived cultural contrast."
      kimbal-musk:
        description: "Kimbal Musk traces his journey from apartheid-era South Africa through cooking school, a near-fatal spinal injury, and co-founding Zip2 with Elon, to building The Kitchen restaurant group and a nonprofit focused on reconnecting Americans with food."
      lee-cronin-3:
        description: "Lee Cronin presents assembly theory — published in Nature as a paper titled 'Assembly Theory Explains and Quantifies Selection and Evolution' — arguing that complexity, copy number, and causal history together provide a universal, chemistry-grounded measure of selection, and that the emergence of life cannot in principle be encoded in the initial conditions of the universe."
      lisa-randall:
        description: "Lisa Randall, theoretical physicist at Harvard, explains how dark matter drives galaxy formation, proposes that a dense disk of dark matter may have periodically triggered mass extinctions on Earth, and explores the state and limits of the standard model of particle physics."
      marc-andreessen-2:
        description: "Marc Andreessen argues that America is poised for a new 'Roaring 20s' as a decade-long soft-authoritarian censorship and demoralization campaign lifts, and covers preference falsification, the mechanics of power, AI's trillion-dollar open questions, immigration, and the corruption of universities."
      marc-raibert:
        description: "Marc Raibert traces 40+ years of legged robotics research from his first pogo-stick hopping machine at Carnegie Mellon in 1982 through BigDog, Atlas, and Spot at Boston Dynamics, and into his current work on athletic and cognitive intelligence at the Boston Dynamics AI Institute."
      mark-cuban:
        description: "Mark Cuban covers his journey from selling garbage bags at age 12 to building and selling Broadcast.com to Yahoo for $5.7 billion, his philosophy on entrepreneurship, his defense of corporate DEI programs, healthcare transparency through Cost Plus Drugs, and his views on AI, politics, and Big Pharma."
      mark-zuckerberg-3:
        description: "Mark Zuckerberg and Lex Fridman conduct a podcast entirely inside the Metaverse using photorealistic Codec Avatars, discussing the technology behind them, Quest 3 mixed reality, Meta AI personas built on Llama 2, and Zuckerberg's vision for a blended physical-digital future."
      matthew-cox:
        description: "Matthew Cox, a former mortgage broker turned FBI Most Wanted fugitive, recounts how a single act of whiteout-based document fraud at age 29 escalated into a $55 million scheme spanning synthetic identities, fake banks, inflated property appraisals, and three years on the run across seven states. After serving 13 years of a 26-year federal sentence, he describes the psychology of escalating crime, the near-universal reality of cooperation among co-conspirators, and his post-prison life running the Inside True Crime YouTube channel."
      michael-levin-2:
        description: "Michael Levin, biologist at Tufts University, argues that intelligence exists on a continuous spectrum from molecules to multicellular collectives, introduces the cognitive light cone as a measure of agency, and proposes that minds are patterns ingressing from a Platonic space into physical interfaces — with direct implications for regenerative medicine, cancer, aging, and AI."
      michael-malice-7:
        description: "Michael Malice and Lex Fridman record a Thanksgiving special ranging from exotic animals and dark humor to geopolitics, art collecting, and personal reflections on happiness, fear, and betrayal. The conversation is structured around gratitude, absurdity, and a live unboxing of a custom sculpture gifted by artist Jake Michael Singer."
      michael-saylor:
        description: "Michael Saylor, CEO of MicroStrategy, makes the case that inflation is a deeply misunderstood multi-dimensional phenomenon, that Bitcoin is the first true digital property in history, and that fixing money is the single highest-leverage intervention available to improve the human condition."
      mohammed-el-kurd:
        description: "Mohammed El-Kurd, Palestinian poet and journalist from the Sheikh Jarrah neighborhood of East Jerusalem, describes the ongoing dispossession of Palestinian families through settler courts, demolitions, and military occupation. He argues that the Palestinian struggle is a political and colonial conflict, not a religious one, and that journalism, poetry, and diaspora organizing are essential tools for achieving liberation."
      narendra-modi:
        description: "Narendra Modi, three-time Prime Minister of India and leader of the world's largest democracy, speaks with Lex Fridman about his rise from extreme poverty in Vadnagar, Gujarat, to the highest office in India. The conversation ranges across fasting as spiritual discipline, the RSS, the 2002 Gujarat riots, India-Pakistan relations, AI, and the philosophy of service that has defined his life."
      neil-adams:
        description: "Neil Adams — world judo champion, five-time European champion, and two-time Olympic silver medalist — reflects on the defining matches of his career, the psychology of winning and losing, and what separates great champions from merely successful ones. He also breaks down judo technique, training philosophy, and his parallel career as the sport's most recognizable commentator."
      neri-oxman:
        description: "Neri Oxman, founder of the Mediated Matter Group at MIT and company Oxman, explains her philosophy of material ecology — designing products that work with nature rather than against it — through projects involving silkworms, bees, bacteria, and glass, and connects that work to questions of beauty, extinction, AGI, and what it means to live a meaningful life."
      nick-lane:
        description: "Nick Lane, biochemist at University College London, argues that life originated in alkaline hydrothermal vents through the thermodynamically driven reaction of CO2 and hydrogen, and that a handful of singular events — the eukaryotic cell, oxygenic photosynthesis, and the Cambrian explosion — explain both the complexity of Earth life and the likely rarity of intelligent life elsewhere."
      norman-ohler:
        description: "Norman Ohler, author of Blitzed and Tripped, reveals how systematic drug use — from methamphetamine distributed to millions of Wehrmacht soldiers to Hitler's escalating opioid addiction — reshaped the course of World War II. Drawing on primary sources from German military archives that mainstream historians overlooked, Ohler argues that drugs are the missing lens for understanding both Nazi military effectiveness and Hitler's catastrophic degeneration as a leader."
      oliver-anthony:
        description: "Oliver Anthony (legal name Christopher Lunsford) discusses the viral phenomenon of 'Rich Men North of Richmond,' his working-class background, battle with depression and alcoholism, and his refusal of $8 million record deals to remain authentic. The conversation ranges from the dehumanizing effects of corporate culture on music and work to the healing power of nature, community, and spiritual faith."
      omar-suleiman-2:
        description: "Imam Dr. Omar Suleiman, Palestinian-American scholar and president of the Yaqeen Institute for Islamic Research, gives a comprehensive account of the Gaza conflict through the lens of occupation history, Islamic ethics, and civil rights. The conversation spans the roots of October 7th, the killing of Palestinian journalists, US political failures, the moral framework of resistance, interfaith fallout, and the spiritual resilience of Gaza's people."
      paul-rosolie-2:
        description: "Naturalist and explorer Paul Rosolie joins Lex Fridman deep in the Peruvian Amazon to discuss apex predators, the biodiversity of the Western Amazon, uncontacted tribes, conservation through Jungle Keepers, ayahuasca, and what the jungle teaches about God and mortality."
      paul-rosolie-3:
        description: "Paul Rosolie describes a historic first contact with a previously unseen Mashco-Piro clan in October 2024, shares footage of the encounter, and details the escalating threats from narco-traffickers that now endanger both Jungle Keepers and the uncontacted tribes they protect."
      pavel-durov:
        description: "Pavel Durov, founder and CEO of Telegram, discusses the philosophy and engineering behind one of the world's largest messaging platforms, serving over a billion users with a core team of just 40. The conversation spans his ascetic personal discipline, his arrest in France, government pressure campaigns to censor political speech, Telegram's privacy architecture, and his broader views on freedom, human nature, and civilization."
      peter-steinberger:
        description: "Peter Steinberger, creator of OpenClaw, discusses how he built the fastest-growing GitHub repository in history as a solo developer, his philosophy of agentic engineering, and why AI agents will make 80% of existing apps obsolete."
      pieter-levels:
        description: "Pieter Levels shares how he built multiple profitable software products solo using minimal tools, why he prefers PHP and jQuery over modern frameworks, and how he went from depression while traveling to making millions with AI photo products."
      rick-beato:
        description: "Rick Beato — music educator, producer, and multi-instrumentalist — joins Lex Fridman to trace the lineage of great guitar playing from Django Reinhardt and bebop through Hendrix, Gilmour, and Metallica. They also explore perfect pitch, AI in music, the YouTube copyright system, and what it means to build mastery across multiple careers."
      rick-spence:
        description: "Rick Spence, historian of intelligence agencies and secret societies, traces the continuous thread from the Tsarist Okhrana through Soviet intelligence to modern conspiracies, cults, and occult movements. The conversation ranges from the MICE framework for recruiting spies, to the Thule Society's role in incubating Nazism, to the copycat-murder theory behind the Manson Family killings."
      robert-f-kennedy-jr:
        description: "Robert F. Kennedy Jr, then a Democratic presidential candidate, covers geopolitics, historical memory, and public health in a wide-ranging conversation recorded on July 4, 2023. He draws on his family's direct involvement in the Cuban Missile Crisis to argue for diplomacy over confrontation, while also laying out his case that regulatory capture by pharma and intelligence-community influence over media represent the central threats to American democracy."
      robert-rodriguez:
        description: "Robert Rodriguez, creator of El Mariachi, Sin City, Desperado, Spy Kids, and Alita: Battle Angel, shares the full arc of his filmmaking philosophy — from shooting a $7,000 feature film on a borrowed camera with no crew to pioneering digital cinema, green screen backlots, and performance capture. The conversation covers creativity as a universal skill, how failure seeds future success, working with Tarantino and Cameron, and why identity shapes what you're capable of creating."
      roman-yampolskiy:
        description: "Roman Yampolskiy, AI safety researcher and author of AI: Unexplainable, Unpredictable, Uncontrollable, argues that creating superintelligent AI is effectively a one-way door to human extinction or permanent subjugation, framing AGI control as an unsolvable engineering problem analogous to building a perpetual motion machine."
      saagar-enjeti-2:
        description: "Saagar Enjeti, co-host of Breaking Points and The Realignment, traces the historical and ideological forces behind Trump's 2024 victory, from the Scots-Irish working-class tradition to the Great Awokening, immigration politics, and the mechanics of Washington bureaucracy. The conversation spans presidential character, DOGE realism, the 2020 election debate, UFOs, and what it would take for either party to rebuild."
      sam-altman-2:
        description: "Sam Altman reflects on the OpenAI board saga, the Elon Musk lawsuit, and the trajectory toward AGI, while sharing concrete views on compute, Sora, GPT-5, safety, and what it will actually mean to build transformative AI."
      sara-walker-3:
        description: "Sara Walker presents assembly theory as a new physics of life — arguing that life is defined by historically contingent construction of complexity, that living objects are gigantic structures in time rather than space, and that the technosphere is the most complex object in the known universe."
      sean-carroll-3:
        description: "Sean Carroll, theoretical physicist at Johns Hopkins, explores general relativity, black holes, Hawking radiation, the holographic principle, dark energy, quantum mechanics' many-worlds interpretation, consciousness, and the emergence of complexity from a low-entropy universe."
      serhii-plokhy:
        description: "Serhii Plokhy, Harvard historian and director of the Ukrainian Research Institute, traces the collapse of the Soviet Union, the deep origins of Ukrainian and Russian national identity, and the historical forces driving the Russo-Ukrainian War. The conversation spans Kievan Rus, Stepan Bandera, KGB assassination operations, Holodomor, Chernobyl, and the nuclear risks that shadow the current conflict."
      sundar-pichai:
        description: "Sundar Pichai discusses his childhood in Chennai without running water or a telephone, Google's AI-first transformation under his leadership, the merger of Google Brain and DeepMind, Gemini's 50x token growth, and new hardware like Google Beam and Android XR glasses."
      tal-wilkenfeld:
        description: "Tal Wilkenfeld — bassist, guitarist, and singer-songwriter who has performed with Jeff Beck, Prince, and Leonard Cohen — discusses the philosophy of musical performance, grief, and spiritual practice. The conversation ranges from technical bass technique to Vedanta philosophy, meditation, and what it means to stand at the edge of creative risk every night on stage."
      teddy-atlas:
        description: "Teddy Atlas, legendary boxing trainer and commentator, traces the Shakespearean arc of his relationships with mentor Cus D'Amato and young Mike Tyson, from the Catskill gym through the gunpoint confrontation that ended his partnership with both. The conversation is as much a philosophy of loyalty, fear, and forgiveness as it is a boxing story."
      terence-tao:
        description: "Terence Tao explores the hardest unsolved problems in mathematics — from Navier-Stokes to the twin prime conjecture — and examines how AI and formal proof systems like Lean are beginning to transform how mathematical research is done."
      theprimeagen:
        description: "ThePrimeagen (Michael Paulson) shares his full life story — from losing his father at 7, meth use, and porn addiction, to becoming a senior engineer at Netflix and a beloved programming streamer — alongside deep dives into programming craft, language selection, AI tools, and personal faith."
      tim-sweeney:
        description: "Tim Sweeney, founder and CEO of Epic Games, traces his journey from a text editor that became ZZT to building Unreal Engine and Fortnite, and explains his vision for a metaverse built on open platforms, a new programming language called Verse, and the dismantling of Apple and Google's 30% app store fees."
      tucker-carlson:
        description: "Tucker Carlson reflects on his February 2024 trip to Moscow and his interview with Vladimir Putin, offering a blunt American-first critique of US foreign policy, media, and the Ukraine war. The conversation spans surveillance of journalists, the 2020 election, Israel-Palestine, and the decline of Western cities."
      tulsi-gabbard:
        description: "Tulsi Gabbard, a Lieutenant Colonel and former Democratic congresswoman, draws on her Iraq deployment and eight years on the House Foreign Affairs and Armed Services committees to dissect the machinery behind US regime-change wars. She argues that a bipartisan military-industrial complex, the TikTok ban bill, and ideological capture of the Democratic Party all trace back to the same hunger for power at the expense of American freedom."
      vejas-liulevicius:
        description: "Historian Vejas Liulevicius traces the intellectual origins of Marxism through its catastrophic implementations in the Soviet Union, Nazi Germany, and Maoist China. The conversation examines how utopian ideology combined with unchecked power produced over 100 million deaths in the 20th century."
      vivek-ramaswamy:
        description: "Vivek Ramaswamy lays out his vision for dismantling the federal bureaucracy and the regulatory state as the defining mission of modern conservatism. He covers DEI, immigration reform, the Ukraine war, China strategy, and what it means to be American in terms of creed rather than blood and soil."
      volodymyr-zelenskyy:
        description: "Volodymyr Zelenskyy, President of Ukraine, speaks from Kyiv in a wide-ranging conversation covering the origins and conduct of the war, his failed 2019 ceasefire negotiations with Putin, and his conditions for a durable peace. Recorded January 2025, the conversation is distinctive for its trilingual format — Ukrainian, Russian, and English — and for Zelenskyy's unfiltered assessments of Trump, Musk, Putin, corruption, elections, and Ukraine's postwar economic future."
      walter-isaacson:
        description: "Walter Isaacson, biographer of Einstein, Steve Jobs, Leonardo da Vinci, Jennifer Doudna, Benjamin Franklin, and Elon Musk, reflects on the inner lives of world-changing figures. The conversation spans childhood trauma as fuel for greatness, visual thinking, management philosophy, the Twitter acquisition, writing craft, and how to live an examined life."
      yann-lecun-3:
        description: "Yann LeCun argues that autoregressive LLMs are fundamentally insufficient for human-level AI and lays out an alternative path through joint-embedding predictive architectures, world models, and hierarchical planning. He also makes a forceful case for open-source AI as the only viable defense against the dangerous concentration of AI power in a handful of companies."
      yuval-noah-harari:
        description: "Yuval Noah Harari, historian and author of Sapiens and Homo Deus, argues that fictional stories are the primary engine of human civilization — the basis of money, religion, nations, and law. He applies this framework to AI, Israeli politics, conspiracy theories, Ukraine, and the nature of consciousness, suffering, and meaning."

    rails-official:
      description: "Official Ruby on Rails podcast hosted by Robby Russell — production Rails architecture, scaling, testing, and engineering culture from teams running Rails at scale"
      ep01-rosa-gutierrez-solid-queue:
        description: "How 37signals built and migrated to Solid Queue — a database-backed ActiveJob backend replacing 7 Resque gems — running 20M+ daily jobs in production on Hey and Basecamp."
      ep02-jean-boussier-io-bound-misconceptions:
        description: "Jean Boussier challenges the assumption that Rails apps are always IO-bound, explaining how to properly measure GVL contention, reason about latency vs. throughput, and use instrumentation before reaching for concurrency solutions."
      ep03-nadia-odunayo-scaling-rails-for-millions-of-users:
        description: "How one developer built and scaled The StoryGraph to four million users using Rails, Turbo Native, Sidekiq, YugabyteDB, and a deliberate choice to stay solo."
      ep04-ryan-stawarz-austin-story-doximity-rails-monolith:
        description: "How Doximity scaled a single Rails monolith to 100–150 engineers by adopting GraphQL Federation for mobile-safe API evolution, Packwerk for domain isolation, and pragmatic service extraction over premature microservices."
      ep05-hilary-stohs-krause-scaling-rails-with-small-wins:
        description: "How incremental, developer-level performance habits — choosing the right ActiveRecord method, eliminating flaky tests, standardizing code conventions — compound into meaningful system-wide improvements in a large Rails monolith."
      ep06-florent-beaurain-optimizing-rails-tests-at-doctolib-scale:
        description: "How Doctolib cut a 7-minute engine test run to under 1 minute by returning to Rails defaults — transactional tests, fixtures over factories, and parallel minitest."
      ep07-alexander-stathis-scaling-modular-rails-monolith-angellist:
        description: "How AngelList evolved a Rails monolith into a modular engine structure using Packwerk, Sorbet, and explicit service-layer patterns to manage a deeply interconnected financial domain."
      ep08-miguel-conde-peter-compernolle-gusto-rails-biolith:
        description: "How Gusto runs two Rails monoliths — a 'biolith' — at 600+ engineer scale, using Packwerk, Sorbet, and service-layer patterns to enforce domain boundaries without going full microservices."
      ep09-kayla-reopelle-what-your-rails-app-is-trying-to-tell-you:
        description: "OpenTelemetry gives Rails developers a vendor-neutral way to collect traces, metrics, and logs that reveal what their app is doing in production — and how to act on those signals."
      ep10-jay-tennier-rainforest-qa-tests-itself:
        description: "Jay Tennier walks through how Rainforest QA — a browser-based test execution platform — applies its own product to test itself, and the hard-won architectural lessons from running a long-lived Rails monolith through multiple team contractions."

